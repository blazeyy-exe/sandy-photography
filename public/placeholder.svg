<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" fill="none" viewBox="0 0 1200 1200">
  <rect width="1200" height="1200" fill="#1a1a2e" rx="3"/>
  <!-- Background circle -->
  <circle cx="600" cy="600" r="250" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="600" r="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  
  <!-- Camera body -->
  <rect x="410" y="440" width="380" height="280" rx="30" fill="#2a2a3e" stroke="#c9a84c" stroke-width="2.5"/>
  
  <!-- Camera top plate -->
  <rect x="470" y="420" width="260" height="40" rx="10" fill="#2a2a3e" stroke="#c9a84c" stroke-width="2"/>
  
  <!-- Viewfinder -->
  <rect x="520" y="410" width="100" height="30" rx="6" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="530" y="418" width="80" height="14" rx="4" fill="#c9a84c" opacity="0.3"/>
  
  <!-- Flash unit -->
  <rect x="680" y="430" width="40" height="20" rx="4" fill="#c9a84c" opacity="0.6"/>
  
  <!-- Lens outer ring -->
  <circle cx="600" cy="570" r="100" fill="#1a1a2e" stroke="#c9a84c" stroke-width="3"/>
  <circle cx="600" cy="570" r="85" fill="#1a1a2e" stroke="#c9a84c" stroke-width="2"/>
  <circle cx="600" cy="570" r="70" fill="#2a2a3e" stroke="#c9a84c" stroke-width="1.5"/>
  
  <!-- Lens inner -->
  <circle cx="600" cy="570" r="55" fill="#3a3a4e" stroke="#c9a84c" stroke-width="1"/>
  <circle cx="600" cy="570" r="40" fill="#4a4a5e" stroke="#c9a84c" stroke-width="0.8"/>
  <circle cx="600" cy="570" r="25" fill="#1a1a2e"/>
  
  <!-- Lens reflection -->
  <ellipse cx="585" cy="555" rx="15" ry="8" fill="white" opacity="0.08" transform="rotate(-30 585 555)"/>
  
  <!-- Lens highlight dots -->
  <circle cx="610" cy="560" r="3" fill="white" opacity="0.15"/>
  <circle cx="595" cy="545" r="2" fill="white" opacity="0.1"/>
  
  <!-- Shutter button -->
  <rect x="478" y="430" width="24" height="14" rx="7" fill="#c9a84c" opacity="0.8"/>
  
  <!-- Mode dial -->
  <circle cx="465" cy="445" r="14" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
  <circle cx="465" cy="445" r="4" fill="#c9a84c" opacity="0.5"/>
  
  <!-- Strap rings -->
  <rect x="405" y="480" width="15" height="30" rx="5" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <rect x="780" y="480" width="15" height="30" rx="5" fill="none" stroke="#c9a84c" stroke-width="2"/>
  
  <!-- Bottom text -->
  <text x="600" y="840" font-family="Georgia, serif" font-size="36" fill="#c9a84c" text-anchor="middle" letter-spacing="6" opacity="0.7">PHOTOGRAPHY</text>
  
  <!-- Decorative dots -->
  <circle cx="450" cy="360" r="3" fill="#c9a84c" opacity="0.2"/>
  <circle cx="750" cy="360" r="2" fill="#c9a84c" opacity="0.15"/>
  <circle cx="400" cy="700" r="2.5" fill="#c9a84c" opacity="0.2"/>
  <circle cx="800" cy="700" r="2" fill="#c9a84c" opacity="0.15"/>
</svg>